
services:
  db:
    image: kartoza/postgis:${POSTGRES_MAJOR_VERSION}-${POSTGIS_MAJOR_VERSION}.${POSTGIS_MINOR_RELEASE}
    container_name: db
    hostname: db
    volumes:
      - ${PWD}/geo-db-data:/var/lib/postgresql
      - ./config/pg_hba.conf.template:/etc/postgresql/17/main/pg_hba.conf.template
    ports:
      - ${POSTGRES_PORT}:5432
    environment:
      - RUN_AS_ROOT=${RUN_AS_ROOT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASS=${POSTGRES_PASS}
      - POSTGRES_UID=${POSTGRES_UID}
      - POSTGRES_GID=${POSTGRES_GID}
      - POSTGRES_MULTIPLE_EXTENSIONS=postgis,hstore,postgis_topology,postgis_raster
      - ALLOW_IP_RANGE=all
      - FORCE_SSL=FALSE
    restart: on-failure
    healthcheck:
      test: "PGPASSWORD=${POSTGRES_PASS} pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
    networks:
      - postgis-net

  osm-ogr2ogr:
    container_name: osm-ogr2ogr
    image: osm-ogr2ogr:latest
    build:
      context: ./
      dockerfile: Ogr2Ogr-Dockerfile
    networks:
      - postgis-net

networks:
  postgis-net:
    driver: bridge

volumes:
  geo-db-data:

